<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            height: 100px;
            width: 100px;
            border-radius: 50%;
            background-color: blue;
            margin: 10px auto;
            transition: 2s;
            border: 2px solid black;

        }
        div:hover{
            
            transform: translateY(500px);
        }
        img{
            height: 100px;
            width: 100px;
            border-radius: 50px;
            transition: 2s;
            
        }
        img:hover{
            transform: rotate(360deg);
        }
    </style>
</head>
<body>
    <div>
        <img src="https://plus.unsplash.com/premium_photo-1763727429545-0e4f78a60c95?q=80&w=426&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="bo" >
    </div>
</body>
</html>
