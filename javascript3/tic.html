<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#141e30,#243b55);
    }

    .game{
      background:white;
      padding:30px;
      border-radius:20px;
      text-align:center;
      box-shadow:0 10px 25px rgba(0,0,0,0.3);
    }

    h1{
      margin-bottom:15px;
      color:#243b55;
    }

    #status{
      margin-bottom:20px;
      font-size:22px;
      font-weight:bold;
    }

    .board{
      display:grid;
      grid-template-columns:repeat(3,100px);
      gap:10px;
    }

    .cell{
      width:100px;
      height:100px;
      font-size:40px;
      font-weight:bold;
      border:none;
      border-radius:12px;
      cursor:pointer;
      background:#e9eef5;
      transition:0.3s;
    }

    .cell:hover{
      background:#cfe0ff;
      transform:scale(1.05);
    }

    .reset{
      margin-top:20px;
      padding:12px 25px;
      border:none;
      background:white;
      color:white;
      font-size:18px;
      border-radius:10px;
      cursor:pointer;
    }

    .reset:hover{
      background:#18293d;
    }
  </style>
</head>
<body>

  <div class="game">
    <h1>Tic Tac Toe</h1>

    <div id="status">Player X Turn</div>

    <div class="board">
      <button class="cell"></button>
      <button class="cell"></button>
      <button class="cell"></button>

      <button class="cell"></button>
      <button class="cell"></button>
      <button class="cell"></button>

      <button class="cell"></button>
      <button class="cell"></button>
      <button class="cell"></button>
    </div>

    <button class="reset" onclick="resetGame()">
      Restart Game
    </button>
  </div>

<script src="tic.js"></script>
</body>
</html>
