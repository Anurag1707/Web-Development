<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: black;
    }

    .calculator{
      width: 320px;
     
      padding: 20px;
     
    }

    .display{
      width: 100%;
      height: 70px;
      background: #111;
      color: white;
      text-align: right;
      padding: 15px;
      font-size: 2rem;
      border-radius: 10px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .buttons{
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button{
      height: 60px;
      border: none;
      border-radius: 50%;
      font-size: 1.3rem;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover{
      transform: scale(1.05);
    }

    .number{
      background: #333;
      color: white;
    }

    .operator{
      background: orange;
      color: white;
    }

    .equal{
      background: #00b894;
      color: white;
      grid-column: span 2;
      border-radius: 20px;
    }

    .clear{
      background: white;
      color: black;
    }

    .output{
        background-color: black;
        height: 70px;
        width: 270px;
        color: white;
        font-size: 50px;
    }
  </style>
</head>
<body>

  <div class="calculator">
    
   <input class="display" >

    <div class="buttons">
      <button class="operator">C</button>
      <button class="operator">..</button>
      <button class="operator">%</button>
      <button class="operator">/</button>

      <button class="number">7</button>
      <button class="number">8</button>
      <button class="number">9</button>
      <button class="operator">*</button>

      <button class="number">4</button>
      <button class="number">5</button>
      <button class="number">6</button>
      <button class="operator">-</button>

      <button class="number">1</button>
      <button class="number">2</button>
      <button class="number">3</button>
      <button class="operator">+</button>

      <button class="equal">0</button>
      <button class="number">.</button>
      <button class="number">=</button>
    </div>

  </div>

  <script src="calculator.js"></script>
</body>
</html>
