<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #main{
            height: 500px;
            width: 300px;
            margin: 10px auto;
            transition: 3s;
            transform-style: preserve-3d;
        }
        #main:hover{
            transform: rotateY(180deg);
        }
        #first{
            position: absolute;
            z-index: 2;
            backface-visibility: hidden;

        }
        /* .back:hover{
            transform: rotateY(180deg);
        } */
        .back{
            position: relative;
            background-color: red;
            height: 200px;
            margin: 10px auto;
            transform: rotateY(180deg);
            /* backface-visibility: hidden; */
            /* z-index: 3; */
        }

    </style>
</head>
<body>
    <div id="main">
    <div id="first">
        <img src="https://plus.unsplash.com/premium_photo-1740530839933-e3a88e73d389?q=80&w=1470&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="not" height="200px">
    </div>
    <div class="back">
         <!-- <h2>Heyyyyyyyy</h2> -->
        <img src="https://images.unsplash.com/photo-1765873360326-54d50adefc15?q=80&w=875&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="not" height="200px">
    </div>
    </div>
</body>
</html>
